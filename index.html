<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Cam - Fixed UI</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* Fills exactly one screen height */
            overflow: hidden; 
        }
        
        /* Video takes up all available top space */
        #camera-container { 
            position: relative; 
            flex-grow: 1; 
            display: flex; 
            background: #111; 
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Status Bar Overlay */
        .status-bar { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.7); padding: 8px 15px; 
            border-radius: 20px; font-size: 14px; z-index: 10;
        }
        .gps-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 5px; }
        .gps-active { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        
        /* Fixed Bottom Controls */
        .controls { 
            background: #222; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-top: 2px solid #444;
            min-height: 80px;
        }
        
        .select-container { flex-grow: 1; margin-right: 20px; }
        select { 
            width: 100%; padding: 12px; border-radius: 8px; 
            background: #333; color: white; border: 1px solid #555; font-size: 16px; 
        }
        
        /* The Shutter Button */
        #capture { 
            width: 75px; height: 75px; border-radius: 50%; 
            border: 4px solid white; background: #ff4444; color: white;
            font-size: 30px; cursor: pointer; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
        }
        #capture:active { background: #cc0000; transform: scale(0.95); }

        #preview-link { display: none; }
    </style>
</head>
<body>

    <div id="camera-container">
        <div class="status-bar">
            <span id="gps-dot" class="gps-dot"></span> <span id="gps-text">Locating GPS...</span>
        </div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div class="select-container">
            <div style="font-size: 12px; color: #aaa; margin-bottom: 5px;">Select ID:</div>
            <select id="tagSelect">
                <option value="FST-1">FST-1</option>
                <option value="SST-1">SST-1</option>
                <option value="TST-1">TST-1</option>
            </select>
        </div>
        
        <button id="capture" title="Take Photo">📸</button>
        <a id="preview-link" target="_blank"></a>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const gpsText = document.getElementById('gps-text');
        const gpsDot = document.getElementById('gps-dot');
        const previewLink = document.getElementById('preview-link');

        let coords = { lat: "Waiting...", lon: "Waiting..." };

        // 1. High-Resolution Camera
        async function startCamera() {
            const constraints = { video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                alert("Camera Error: Please allow permissions.");
            }
        }

        // 2. High Accuracy GPS
        function startGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        coords.lat = pos.coords.latitude.toFixed(6);
                        coords.lon = pos.coords.longitude.toFixed(6);
                        gpsText.innerText = `Lat: ${coords.lat}, Lon: ${coords.lon}`;
                        gpsDot.classList.add('gps-active');
                    },
                    (err) => {
                        gpsText.innerText = "GPS Error. Please allow location.";
                        gpsDot.classList.remove('gps-active');
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }
        }

        // 3. Capture & Stamp
        document.getElementById('capture').addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw Video
            ctx.drawImage(video, 0, 0);

            // Draw Background Box for Text
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(10, canvas.height - 180, 500, 160);

            // Draw Text
            ctx.fillStyle = "#FFD700"; // Gold color like your original
            ctx.font = "bold 45px Arial";
            const siteID = document.getElementById('tagSelect').value;
            const time = new Date().toLocaleString();

            ctx.fillText(`ID: ${siteID}`, 30, canvas.height - 120);
            
            ctx.fillStyle = "white";
            ctx.font = "35px Arial";
            ctx.fillText(`Loc: ${coords.lat}, ${coords.lon}`, 30, canvas.height - 70);
            ctx.fillText(time, 30, canvas.height - 30);

            // Trigger Download
            const imgData = canvas.toDataURL('image/jpeg', 0.9);
            previewLink.href = imgData;
            previewLink.download = `${siteID}_${Date.now()}.jpg`;
            previewLink.click();
        });

        startCamera();
        startGPS();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GPS Cam</title>
    <style>
        :root { --primary: #007bff; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Video Container */
        #camera-container { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI Overlays */
        .status-bar { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #444; }
        .gps-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
        .gps-active { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        
        .controls { background: #222; padding: 20px; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        select { width: 100%; padding: 12px; border-radius: 8px; background: #333; color: white; border: 1px solid #444; font-size: 16px; }
        
        #capture { 
            width: 70px; height: 70px; border-radius: 50%; border: 5px solid white; background: var(--danger);
            cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #capture:active { transform: scale(0.9); }

        #preview-link { color: #4db8ff; text-decoration: none; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="camera-container">
        <div class="status-bar">
            <span id="gps-dot" class="gps-dot"></span> <span id="gps-text">Waiting for GPS...</span>
        </div>
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="controls">
        <select id="tagSelect">
            <option value="FST-1">Site: FST-1</option>
            <option value="SST-1">Site: SST-1</option>
            <option value="TST-1">Site: TST-1</option>
        </select>
        
        <button id="capture"></button>
        <a id="preview-link" target="_blank">View Last Photo</a>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const gpsText = document.getElementById('gps-text');
        const gpsDot = document.getElementById('gps-dot');
        const previewLink = document.getElementById('preview-link');

        let coords = { lat: "0.0000", lon: "0.0000" };

        // 1. High-Resolution Camera Access
        async function startCamera() {
            const constraints = {
                video: {
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                alert("Camera Error: Please allow permissions.");
            }
        }

        // 2. Persistent GPS Tracking
        function startGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        coords.lat = pos.coords.latitude.toFixed(6);
                        coords.lon = pos.coords.longitude.toFixed(6);
                        gpsText.innerText = `Lat: ${coords.lat}, Lon: ${coords.lon}`;
                        gpsDot.classList.add('gps-active');
                    },
                    (err) => {
                        gpsText.innerText = "GPS Error: " + err.message;
                        gpsDot.classList.remove('gps-active');
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }
        }

        // 3. Capture & Stamp
        document.getElementById('capture').addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // Match canvas to real video pixels (Fixes blur)
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0);

            // Overlay Background Box (for readability)
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
            ctx.fillRect(0, canvas.height - 150, 450, 150);

            // Text Styles
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            const siteID = document.getElementById('tagSelect').value;
            const time = new Date().toLocaleString();

            ctx.fillText(`ID: ${siteID}`, 30, canvas.height - 100);
            ctx.font = "30px Arial";
            ctx.fillText(`GPS: ${coords.lat}, ${coords.lon}`, 30, canvas.height - 60);
            ctx.fillText(time, 30, canvas.height - 25);

            // Export
            const imgData = canvas.toDataURL('image/jpeg', 0.9);
            previewLink.href = imgData;
            previewLink.download = `${siteID}_Photo.jpg`;
            previewLink.style.display = "block";
            
            // Optional: Auto-click download
            previewLink.click();
        });

        startCamera();
        startGPS();
    </script>
</body>
</html>
